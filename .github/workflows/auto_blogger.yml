# Workflow หลักสำหรับเขียนบทความ บันทึกโค้ด และบิลด์ดีพลอยบล็อกขึ้น GitHub Pages ในรันเดียว
name: Auto Generate Blog Post & Deploy

on:
  schedule:
    # รันทุกวันเวลา 01:00 UTC (08:00 น. เวลาไทย)
    - cron: '0 1 * * *'
  
  # สั่งรันแมนนวลจากแท็บ Actions บนหน้าเว็บ
  workflow_dispatch:

permissions:
  contents: write # เพื่อเซฟไฟล์บทความกลับเข้า Git
  pages: write    # เพื่ออัปเดตหน้าเว็บจริงบน GitHub Pages
  id-token: write # สำหรับสร้าง Pages deployment

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  write-commit-build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.148.0

    steps:
      # 1. ดึงโค้ดลงเครื่อง VM
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # 2. ตั้งค่า Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. ติดตั้ง Python dependencies
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. รันสคริปต์เขียนบทความอัตโนมัติ
      - name: Run Auto Blogger Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python auto_blogger.py

      # 5. Commit และ Push บทความใหม่กลับเข้าคลังเก็บโค้ด
      - name: Commit and Push changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "New article detected. Preparing to commit..."
            git config --global user.name "github-actions[bot]"
            git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "Feat: auto-generate post by AI (GitHub Actions Scheduler)"
            git push origin master
          else
            echo "No changes detected. Skipping commit."
          fi

      # 6. ติดตั้ง Hugo CLI
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${{ env.HUGO_VERSION }}/hugo_extended_${{ env.HUGO_VERSION }}_linux-amd64.deb
          sudo dpkg -i ${{ runner.temp }}/hugo.deb

      # 7. ตั้งค่าระบบ Pages
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      # 8. บิลด์หน้าเว็บด้วย Hugo
      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENV: production
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      # 9. อัปโหลดผลลัพธ์การบิลด์ขึ้นไปเตรียมดีพลอย
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  # ขั้นตอนสุดท้าย: ส่งไฟล์ขึ้นคลาวด์ออนไลน์จริง
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: write-commit-build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
