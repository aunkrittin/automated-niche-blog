# Workflow สำหรับรันสคริปต์เขียนบทความอัตโนมัติด้วย AI ตามเวลาที่กำหนด
name: Auto Generate Blog Post

on:
  schedule:
    # รันทุกวันเวลา 01:00 UTC (ซึ่งตรงกับเวลา 08:00 น. ของประเทศไทยพอดี)
    - cron: '0 1 * * *'
  
  # เปิดปุ่มให้สามารถกดสั่งเขียนบทความแบบแมนนวลได้จากแท็บ Actions
  workflow_dispatch:

permissions:
  contents: write # เพื่ออนุญาตให้บอททำการ Push โค้ด/บทความใหม่กลับขึ้นคลังของตนเองได้

jobs:
  write-and-commit:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository ลงเครื่อง VM
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # ดึงประวัติทั้งหมดเพื่อทำ Git Commit

      # 2. ตั้งค่า Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. ติดตั้ง Dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. รันสคริปต์เขียนบทความอัตโนมัติ
      - name: Run Auto Blogger Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python auto_blogger.py

      # 5. Commit และ Push บทความใหม่กลับขึ้น GitHub
      - name: Commit and Push changes
        run: |
          # ตรวจสอบว่ามีความเปลี่ยนแปลงเกิดขึ้นใน Repo หรือไม่ (มีบทความใหม่หรือหัวข้ออัปเดตไหม)
          if [ -n "$(git status --porcelain)" ]; then
            echo "New article detected. Preparing to commit..."
            git config --global user.name "github-actions[bot]"
            git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "Feat: auto-generate post by AI (GitHub Actions Scheduler)"
            git push origin master
          else
            echo "No changes detected. Skipping commit."
          fi
